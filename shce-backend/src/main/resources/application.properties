# ═══════════════════════════════════════════════════════════════
# Secure Hybrid Crypto Engine — Application Configuration
# ═══════════════════════════════════════════════════════════════

spring.application.name=secure-hybrid-crypto-engine

# ── TLS-Handshake ────────────────────────────────────────────────────
server.ssl.enabled=true
server.ssl.key-store=classpath:sslkeystore.p12
server.ssl.key-store-password=Kirt@n123
server.ssl.key-store-type=PKCS12
server.port=8443

# ── Logging ────────────────────────────────────────────────────
logging.level.com.shce=DEBUG
logging.level.org.bouncycastle=INFO

# ── JSON Serialization ────────────────────────────────────────
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# ── Request Size (keys can be large, especially PQC) ──────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10MB
